{% extends "base.html" %}
{% block content %}

<section class="page-shell">
    <div class="container">
        <div class="app-card p-4 p-md-5">
            <div class="mb-4">
                <div class="eyebrow">Lab Catalog</div>
                <h1 class="h3 fw-bold mb-0">Add New Test</h1>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Test Name</label>
                        <input type="text" name="test_name" class="form-control" placeholder="CBC" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Price</label>
                        <input type="number" name="price" class="form-control" placeholder="500" min="0" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Time Required</label>
                        <input type="text" name="time_required" class="form-control" placeholder="1-2 hours">
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Save Test</button>
                    <a href="{% url 'all_tests' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>

{% endblock %}
